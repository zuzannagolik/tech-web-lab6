<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog - Supabase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
  </head>
  <body class="bg-slate-100 min-h-screen p-8 font-sans text-slate-800">
    
    <div class="max-w-4xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-bold text-slate-900 mb-2">Moje Artykuły</h1>
            <p class="text-slate-500">Projekt Supabase API</p>
        </header>

        <div class="mb-6 flex justify-end">
            <div class="flex items-center gap-3">
                <label for="sortSelect" class="font-semibold text-slate-700">Sortuj:</label>
                <select id="sortSelect" class="p-2 border border-slate-300 rounded-md shadow-sm">
                    <option value="created_at.desc">Po dacie malejąco (najnowsze)</option>
                    <option value="created_at.asc">Po dacie rosnąco (najstarsze)</option>
                    <option value="title.asc">Po nazwie alfabetycznie</option>
                </select>
            </div>
        </div>



        <div class="bg-white p-8 rounded-xl shadow-md border border-slate-200">
            <h2 class="text-2xl font-bold mb-6 text-slate-800">Dodaj nowy artykuł</h2>
            <form id="addArticleForm" class="space-y-4">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="title" class="block text-sm font-medium text-slate-700 mb-1">Tytuł</label>
                        <input type="text" id="title" required class="w-full p-2 border border-slate-300 rounded-md">
                    </div>
                    <div>
                        <label for="subtitle" class="block text-sm font-medium text-slate-700 mb-1">Podtytuł</label>
                        <input type="text" id="subtitle" required class="w-full p-2 border border-slate-300 rounded-md">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="author" class="block text-sm font-medium text-slate-700 mb-1">Autor</label>
                        <input type="text" id="author" required class="w-full p-2 border border-slate-300 rounded-md">
                    </div>
                    <div>
                        <label for="createdAt" class="block text-sm font-medium text-slate-700 mb-1">Data utworzenia</label>
                        <input type="datetime-local" id="createdAt" required class="w-full p-2 border border-slate-300 rounded-md">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="tags" class="block text-sm font-medium text-slate-700 mb-1">Tagi</label>
                        <input type="text" id="tags" placeholder="np. nauka, technologia, supabase" class="w-full p-2 border border-slate-300 rounded-md">
                    </div>
                    <div class="flex items-center mt-6">
                        <input type="checkbox" id="isPublished" class="w-5 h-5 text-blue-600 border-slate-300 rounded focus:ring-blue-500">
                        <label for="isPublished" class="ml-2 block text-sm font-medium text-slate-700">Opublikuj od razu</label>
                    </div>
                </div>

                <div>
                    <label for="content" class="block text-sm font-medium text-slate-700 mb-1">Treść artykułu</label>
                    <textarea id="content" rows="4" required class="w-full p-2 border border-slate-300 rounded-md"></textarea>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-md">
                    Wyślij artykuł
                </button>
            </form>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
