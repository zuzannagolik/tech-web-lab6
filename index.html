<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artykuły - Supabase</title>
  </head>

 <body class ="bg-gray-100 p-5">
    <template id="article-template">
        <div class="py-4">
            <h3 class="tail-title text-2xl font-bold text-gray-900"></h3>
            <h4 class="tail-subtitle text-lg text-gray-600"></h4>
            <p class="text-sm text-gray-400 my-1">
                Autor: <span class="tail-author"></span> | Data: <span class="tail-date"></span>
            </p>
            <p class="tail-content text-base text-gray-700 mt-2"></p>
            <hr class="mt-4 border-gray-200" />
        </div>
    </template>
    <div class="max-w-2xl mx-auto bg-white p-6 rounded shadow">
    <h1 class="text-3xl font-bold mb-5 text-center text-600">Lista artykułów:</h1>

    <div class="mb-5">
      <label for="sort-articles" class="block text-sm font-medium text-gray-700 mb-1">Sortuj artykuły:</label>
      <select id="sort-articles" class="w-full border p-2 rounded border-gray-200 bg-white">
        <option value="created_at.asc">Po dacie rosnąco</option>
        <option value="created_at.desc">Po dacie malejąco</option>
        <option value="title.asc">Po nazwie alfabetycznie</option>
      </select>
    </div>

    <div id="list-of-articles" class="space-y-4"></div>
    <h2 class="text-2xl font-bold text-blue-500 mb-4">Dodaj nowy artykuł</h2>
    <form id="add-article" class="space-y-3">
      <div>
        <label for="title">Tytuł:</label><br>
        <input class="w-full border p-2 rounded border-gray-300" type="text" id="title" required>
      </div>

      <div>
        <label for="subtitle">Podtytuł:</label><br>
        <input class="w-full border p-2 rounded border-gray-300" type="text" id="subtitle" required>
      </div>
      <div>
        <label for="author">Autor:</label><br>
        <input class="w-full border p-2 rounded border-gray-300" type="text" id="author" required>
      </div>
      <div>
        <label for="created_at">Data utworzenia:</label><br>
        <input class="w-full border p-2 rounded border-gray-300" type="datetime-local" id="created_at">
      </div>
      
      <div>
        <label for="content">Treść:</label><br>
        <textarea class="w-full border p-2 rounded border-gray-300" id="content" rows="5" required></textarea>
      </div>
      <button type="submit" class="w-full bg-blue-400 text-white p-2 rounded">Dodaj artykuł</button>
    </form>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
